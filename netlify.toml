[build]
  publish   = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "zisi"

# Videresend /frost/* til Netlify Function som legger til auth mot Frost API
[[redirects]]
  from   = "/frost/*"
  to     = "/.netlify/functions/frost"
  status = 200
  force  = true

# SPA-routing for React-apper (sender alle understi-er til index.html)
[[redirects]]
  from   = "/seiling/*"
  to     = "/seiling/index.html"
  status = 200

[[redirects]]
  from   = "/kystvaer/*"
  to     = "/kystvaer/index.html"
  status = 200
