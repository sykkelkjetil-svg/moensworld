<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Norsk Vær Live — Frost API</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a14;
      color: #fff;
      overflow: hidden;
    }

    #map { width: 100vw; height: 100vh; }

    /* ── Panel ── */
    #panel {
      position: absolute;
      top: 20px; left: 20px;
      z-index: 1000;
      background: rgba(8, 8, 20, 0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 18px 20px;
      width: 230px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }

    #panel h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #fff;
    }

    .subtitle {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 14px;
      margin-top: 2px;
    }

    .param-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 9px;
      color: rgba(255,255,255,0.5);
      padding: 8px 11px;
      cursor: pointer;
      font-size: 12.5px;
      text-align: left;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      margin-bottom: 5px;
    }
    .param-btn:hover { background: rgba(255,255,255,0.09); color: #fff; }
    .param-btn.active-temp  { background: rgba(239,68,68,0.18);  border-color: rgba(239,68,68,0.4);  color: #fca5a5; }
    .param-btn.active-wind  { background: rgba(99,179,237,0.18); border-color: rgba(99,179,237,0.4); color: #93c5fd; }
    .param-btn.active-precip{ background: rgba(96,165,250,0.18); border-color: rgba(96,165,250,0.4); color: #93c5fd; }
    .param-btn.active-humid { background: rgba(52,211,153,0.18); border-color: rgba(52,211,153,0.4); color: #6ee7b7; }
    .param-btn.active-lightning { background: rgba(250,204,21,0.18); border-color: rgba(250,204,21,0.4); color: #fde047; }

    #legend {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    #legend-title { font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 5px; }
    #legend-bar   { height: 10px; border-radius: 5px; margin-bottom: 4px; }
    #legend-labels{ display: flex; justify-content: space-between; font-size: 9px; color: rgba(255,255,255,0.35); }

    /* Lightning controls */
    #lightning-controls {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    #lightning-controls.visible { display: block; }

    #ln-time {
      font-size: 11px;
      color: rgba(250,204,21,0.8);
      text-align: center;
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
      min-height: 16px;
    }

    #play-btn {
      width: 100%;
      background: rgba(250,204,21,0.15);
      border: 1px solid rgba(250,204,21,0.3);
      border-radius: 8px;
      color: #fde047;
      padding: 7px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: background 0.15s;
      margin-bottom: 6px;
    }
    #play-btn:hover { background: rgba(250,204,21,0.25); }

    #speed-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: rgba(255,255,255,0.35);
    }
    #speed-slider { flex: 1; accent-color: #fde047; }

    #ln-progress {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    #ln-progress-bar {
      height: 100%;
      background: #fde047;
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s linear;
    }

    #ln-count {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      text-align: center;
      margin-top: 6px;
    }

    /* Footer info */
    #info-row {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #refresh-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer; font-size: 13px;
      transition: color 0.2s;
    }
    #refresh-btn:hover { color: rgba(255,255,255,0.7); }

    /* Status bar */
    #status {
      position: absolute;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(8,8,20,0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      display: none;
      white-space: nowrap;
    }
    #status.visible { display: block; }

    /* Leaflet popup dark theme */
    .leaflet-popup-content-wrapper {
      background: rgba(8,8,20,0.96) !important;
      border: 1px solid rgba(255,255,255,0.12) !important;
      border-radius: 14px !important;
      box-shadow: 0 12px 40px rgba(0,0,0,0.7) !important;
      color: #fff !important;
      padding: 0 !important;
    }
    .leaflet-popup-content { margin: 0 !important; padding: 14px 16px !important; }
    .leaflet-popup-tip-container { display: none !important; }
    .leaflet-popup-close-button { color: rgba(255,255,255,0.4) !important; top: 8px !important; right: 10px !important; }

    .popup-name { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
    .popup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .popup-cell { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 7px 9px; }
    .popup-label { font-size: 9px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px; }
    .popup-val   { font-size: 16px; font-weight: 700; margin-top: 1px; }
    .popup-meta  { font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 10px; }

    /* Leaflet attribution */
    .leaflet-control-attribution { background: rgba(0,0,0,0.5) !important; color: rgba(255,255,255,0.3) !important; font-size: 9px !important; }
    .leaflet-control-attribution a { color: rgba(255,255,255,0.4) !important; }

    /* Lightning flash keyframes */
    @keyframes flash {
      0%   { opacity: 1; r: 6; }
      30%  { opacity: 0.9; r: 10; }
      100% { opacity: 0; r: 14; }
    }
    .ln-flash { animation: flash 1.8s ease-out forwards; }
  </style>
</head>
<body>

<div id="map"></div>

<div id="panel">
  <h1>⛅ Norsk Vær Live</h1>
  <div class="subtitle">Frost API · Meteorologisk institutt</div>

  <button class="param-btn active-temp" id="btn-temp"     onclick="setParam('temp')">🌡️ Temperatur</button>
  <button class="param-btn"             id="btn-wind"     onclick="setParam('wind')">💨 Vindstyrke</button>
  <button class="param-btn"             id="btn-precip"   onclick="setParam('precip')">🌧️ Nedbør</button>
  <button class="param-btn"             id="btn-humid"    onclick="setParam('humid')">💧 Luftfuktighet</button>
  <button class="param-btn"             id="btn-lightning" onclick="setParam('lightning')">⚡ Lynnedslag</button>

  <div id="legend">
    <div id="legend-title"></div>
    <div id="legend-bar"></div>
    <div id="legend-labels"></div>
  </div>

  <div id="lightning-controls">
    <div id="ln-time">Klikk Spill for å animere</div>
    <button id="play-btn" onclick="togglePlay()">▶ Spill av mars 2026</button>
    <div id="speed-row">
      <span>Hastighet:</span>
      <input id="speed-slider" type="range" min="1" max="5" value="3" />
      <span id="speed-label">1×</span>
    </div>
    <div id="ln-progress"><div id="ln-progress-bar"></div></div>
    <div id="ln-count"></div>
  </div>

  <div id="info-row">
    <span id="station-count">Laster…</span>
    <button id="refresh-btn" title="Oppdater" onclick="loadWeather()">↺</button>
  </div>
</div>

<div id="status"></div>

<script>
// ─────────────────────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────────────────────
// Lokalt: bruk frost-proxy.js på port 3333. På Netlify: bruk serverless function.
const AUTH  = null;
const FROST = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:3333/frost'
  : '/frost';

// Geographic centers for station coverage across Norway
const CENTERS = [
  [58.1, 7.9], [59.0, 5.7], [59.9, 10.7], [60.4, 5.3],
  [60.8, 11.5],[62.5, 6.2], [63.4, 10.4], [65.5, 13.5],
  [68.5, 17.4],[69.7, 18.9],[70.5, 25.0], [70.0, 22.0],
];

// ─────────────────────────────────────────────────────────────
//  PARAMETER DEFINITIONS
// ─────────────────────────────────────────────────────────────
const PARAMS = {
  temp: {
    label: 'Temperatur', unit: '°C',
    element: 'air_temperature',
    min: -20, max: 30,
    stops: [
      [-20,'#0d47a1'],[-10,'#42a5f5'],[0,'#80deea'],
      [5,'#a5d6a7'],[10,'#fff176'],[20,'#ffa726'],[30,'#c62828']
    ],
    legendTicks: ['-20','-10','0','10','20','30'],
  },
  wind: {
    label: 'Vindstyrke', unit: ' m/s',
    element: 'wind_speed',
    min: 0, max: 25,
    stops: [
      [0,'#e8f5e9'],[5,'#66bb6a'],[10,'#ffd54f'],
      [15,'#ff8f00'],[20,'#e53935'],[25,'#7b1fa2']
    ],
    legendTicks: ['0','5','10','15','20','25'],
  },
  precip: {
    label: 'Nedbør (1t)', unit: ' mm',
    element: 'sum(precipitation_amount PT1H)',
    min: 0, max: 10,
    stops: [
      [0,'#e3f2fd'],[1,'#90caf9'],[3,'#42a5f5'],
      [6,'#1565c0'],[10,'#4a148c']
    ],
    legendTicks: ['0','2','4','6','8','10'],
  },
  humid: {
    label: 'Luftfuktighet', unit: '%',
    element: 'relative_humidity',
    min: 0, max: 100,
    stops: [
      [0,'#fff9c4'],[30,'#c8e6c9'],[60,'#81d4fa'],
      [80,'#1565c0'],[100,'#1a237e']
    ],
    legendTicks: ['0','20','40','60','80','100'],
  },
};

// ─────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────
let map, markersLayer, lightningLayer;
let allStations  = {};
let obsCache     = {};       // { 'temp': {SN...: {value,time,unit}}, ... }
let lightningData= [];       // parsed lightning rows
let currentParam = 'temp';

// Lightning animation state
let lnPlaying    = false;
let lnIndex      = 0;
let lnTimer      = null;
let lnSpeeds     = [30, 20, 12, 6, 2];  // ms per strike at speed 1-5

// ─────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────
function init() {
  map = L.map('map', { center:[65.0,16.0], zoom:5, zoomControl:false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:19
  }).addTo(map);
  L.control.zoom({ position:'topright' }).addTo(map);

  markersLayer  = L.layerGroup().addTo(map);
  lightningLayer= L.layerGroup().addTo(map);

  updateLegend();
  loadWeather();
  setInterval(loadWeather, 10 * 60 * 1000);

  document.getElementById('speed-slider').addEventListener('input', updateSpeedLabel);
  updateSpeedLabel();
}

// ─────────────────────────────────────────────────────────────
//  STATUS / HELPERS
// ─────────────────────────────────────────────────────────────
function setStatus(msg) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.toggle('visible', !!msg);
}

function hexToRgb(hex) {
  return [
    parseInt(hex.slice(1,3),16),
    parseInt(hex.slice(3,5),16),
    parseInt(hex.slice(5,7),16),
  ];
}

function getColor(value, param) {
  const stops = PARAMS[param].stops;
  const min   = stops[0][0];
  const max   = stops[stops.length-1][0];
  const v     = Math.max(min, Math.min(max, value));

  for (let i = 1; i < stops.length; i++) {
    if (v <= stops[i][0]) {
      const t  = (v - stops[i-1][0]) / (stops[i][0] - stops[i-1][0]);
      const c1 = hexToRgb(stops[i-1][1]);
      const c2 = hexToRgb(stops[i][1]);
      const r  = Math.round(c1[0] + (c2[0]-c1[0])*t);
      const g  = Math.round(c1[1] + (c2[1]-c1[1])*t);
      const b  = Math.round(c1[2] + (c2[2]-c1[2])*t);
      return `rgb(${r},${g},${b})`;
    }
  }
  return stops[stops.length-1][1];
}

// ─────────────────────────────────────────────────────────────
//  PARAMETER SWITCHING
// ─────────────────────────────────────────────────────────────
function setParam(p) {
  if (lnPlaying) stopPlay();

  currentParam = p;

  // Reset all button classes
  ['temp','wind','precip','humid','lightning'].forEach(k => {
    const btn = document.getElementById('btn-' + k);
    btn.className = 'param-btn' + (k===p ? ' active-'+k : '');
  });

  const lnControls = document.getElementById('lightning-controls');
  lnControls.classList.toggle('visible', p === 'lightning');
  document.getElementById('legend').style.display = p === 'lightning' ? 'none' : 'block';

  updateLegend();
  markersLayer.clearLayers();
  lightningLayer.clearLayers();

  if (p === 'lightning') {
    loadLightning();
  } else {
    renderWeather();
  }
}

// ─────────────────────────────────────────────────────────────
//  LEGEND
// ─────────────────────────────────────────────────────────────
function updateLegend() {
  if (currentParam === 'lightning') return;
  const p = PARAMS[currentParam];
  document.getElementById('legend-title').textContent = p.label + ' (' + p.unit.trim() + ')';

  const cols = p.stops.map(s => s[1]);
  document.getElementById('legend-bar').style.background =
    'linear-gradient(to right,' + cols.join(',') + ')';

  document.getElementById('legend-labels').innerHTML =
    p.legendTicks.map(t => '<span>'+t+'</span>').join('');
}

// ─────────────────────────────────────────────────────────────
//  FETCH STATIONS
// ─────────────────────────────────────────────────────────────
async function fetchStations() {
  const promises = CENTERS.map(([lat,lon]) => {
    const url = `${FROST}/sources/v0.jsonld?types=SensorSystem`
      + `&fields=id,name,geometry,masl,municipality,county`
      + `&geometry=nearest(POINT(${lon}%20${lat}))&nearestmaxcount=150`;
    return fetch(url)
      .then(r => r.json()).then(d => d.data||[]).catch(()=>[]);
  });
  const results = await Promise.all(promises);
  const stations = {};
  results.flat().forEach(s => {
    if (s.id && s.geometry?.coordinates) stations[s.id] = s;
  });
  return stations;
}

// ─────────────────────────────────────────────────────────────
//  FETCH OBSERVATIONS
// ─────────────────────────────────────────────────────────────
async function fetchObs(ids, element) {
  const BATCH = 50;
  const results = {};
  for (let i = 0; i < ids.length; i += BATCH) {
    const batch = ids.slice(i, i+BATCH);
    const url = `${FROST}/observations/v0.jsonld`
      + `?sources=${encodeURIComponent(batch.join(','))}`
      + `&referencetime=latest`
      + `&elements=${encodeURIComponent(element)}`;
    try {
      const r = await fetch(url, {});
      const d = await r.json();
      (d.data||[]).forEach(item => {
        const sid  = item.sourceId.split(':')[0];
        const obs  = item.observations || [];
        // Prefer PT10M or PT1H resolution
        const best = obs.find(o => ['PT10M','PT1H'].includes(o.timeResolution)) || obs[0];
        if (best) results[sid] = { value:best.value, time:item.referenceTime, unit:best.unit };
      });
    } catch(e) { /* skip failed batch */ }
  }
  return results;
}

// ─────────────────────────────────────────────────────────────
//  LOAD WEATHER (main)
// ─────────────────────────────────────────────────────────────
async function loadWeather() {
  if (currentParam === 'lightning') return;
  setStatus('Henter værstasjoner…');
  try {
    if (Object.keys(allStations).length === 0) {
      allStations = await fetchStations();
    }
    const ids = Object.keys(allStations);
    setStatus(`Henter observasjoner for ${ids.length} stasjoner…`);

    // Load all 4 params in parallel
    const [tData, wData, pData, hData] = await Promise.all([
      fetchObs(ids, PARAMS.temp.element),
      fetchObs(ids, PARAMS.wind.element),
      fetchObs(ids, PARAMS.precip.element),
      fetchObs(ids, PARAMS.humid.element),
    ]);
    obsCache = { temp:tData, wind:wData, precip:pData, humid:hData };

    const nData = Object.keys(tData).length;
    document.getElementById('station-count').textContent =
      `${ids.length} stasjoner · ${nData} med data`;

    setStatus('');
    renderWeather();
  } catch(e) {
    setStatus('Feil: ' + e.message + ' — er frost-proxy.js startet?');
    console.error(e);
  }
}

// ─────────────────────────────────────────────────────────────
//  RENDER WEATHER MARKERS
// ─────────────────────────────────────────────────────────────
function renderWeather() {
  markersLayer.clearLayers();
  const data  = obsCache[currentParam] || {};
  const param = PARAMS[currentParam];

  Object.entries(allStations).forEach(([id, st]) => {
    const obs = data[id];
    if (!obs || obs.value == null) return;
    const [lon,lat] = st.geometry.coordinates;
    if (!lat||!lon) return;

    const color = getColor(obs.value, currentParam);

    const marker = L.circleMarker([lat,lon], {
      radius:      7,
      fillColor:   color,
      fillOpacity: 0.85,
      color:       'rgba(255,255,255,0.25)',
      weight:      1.5,
    });

    // Build popup
    const rows = ['temp','wind','precip','humid'].map(p => {
      const v = obsCache[p]?.[id];
      if (!v || v.value == null) return '';
      const c = getColor(v.value, p);
      return `<div class="popup-cell">
        <div class="popup-label">${PARAMS[p].label}</div>
        <div class="popup-val" style="color:${c}">${v.value}${PARAMS[p].unit}</div>
      </div>`;
    }).join('');

    const time = obs.time
      ? new Date(obs.time).toLocaleTimeString('no-NO',{hour:'2-digit',minute:'2-digit'})
      : '';

    marker.bindPopup(`
      <div class="popup-name">${st.name}</div>
      <div class="popup-grid">${rows}</div>
      <div class="popup-meta">
        ${[st.municipality, st.county ? st.county : ''].filter(Boolean).join(' · ')}
        ${st.masl != null ? ' · ' + st.masl + ' moh.' : ''}
        ${time ? ' · Kl. ' + time : ''}
      </div>
    `, { maxWidth:280 });

    marker.bindTooltip(obs.value + param.unit, {
      direction:'top', className:'', permanent:false
    });

    markersLayer.addLayer(marker);
  });
}

// ─────────────────────────────────────────────────────────────
//  LIGHTNING — FETCH
// ─────────────────────────────────────────────────────────────
async function loadLightning() {
  if (lightningData.length > 0) {
    document.getElementById('ln-count').textContent =
      lightningData.length + ' lynnedslag lastet (mars 2026)';
    return;
  }
  setStatus('Henter lynnedslag for mars 2026…');
  try {
    const resp = await fetch(
      `${FROST}/lightning/v0.jsonld?referencetime=2026-03-01/2026-03-29`,
      {}
    );
    const text = await resp.text();
    // Format: type year month day hour min sec nanosec lat lon amplitude ...
    lightningData = text.trim().split('\n').map(line => {
      const c = line.trim().split(/\s+/);
      if (c.length < 11) return null;
      return {
        lat: parseFloat(c[8]),
        lon: parseFloat(c[9]),
        amp: parseFloat(c[10]),   // kA, negative = ground stroke
        ts:  new Date(
          parseInt(c[1]), parseInt(c[2])-1, parseInt(c[3]),
          parseInt(c[4]), parseInt(c[5]), parseInt(c[6])
        ),
      };
    }).filter(Boolean);

    lightningData.sort((a,b) => a.ts - b.ts);

    setStatus('');
    document.getElementById('ln-count').textContent =
      lightningData.length + ' lynnedslag · mars 2026';
    document.getElementById('ln-time').textContent = 'Klikk Spill for å animere';
  } catch(e) {
    setStatus('Feil ved lasting av lyndata');
    console.error(e);
  }
}

// ─────────────────────────────────────────────────────────────
//  LIGHTNING — ANIMATION
// ─────────────────────────────────────────────────────────────
function updateSpeedLabel() {
  const s = parseInt(document.getElementById('speed-slider').value);
  const labels = ['¼×','½×','1×','2×','4×'];
  document.getElementById('speed-label').textContent = labels[s-1];
}

function togglePlay() {
  if (lnPlaying) stopPlay();
  else           startPlay();
}

function startPlay() {
  if (lightningData.length === 0) return;
  lnPlaying = true;
  document.getElementById('play-btn').textContent = '⏸ Pause';
  if (lnIndex >= lightningData.length) lnIndex = 0;
  scheduleNext();
}

function stopPlay() {
  lnPlaying = false;
  clearTimeout(lnTimer);
  document.getElementById('play-btn').textContent = '▶ Spill av mars 2026';
}

function scheduleNext() {
  if (!lnPlaying || lnIndex >= lightningData.length) {
    if (lnIndex >= lightningData.length) {
      lnPlaying = false;
      lnIndex   = 0;
      document.getElementById('play-btn').textContent = '▶ Spill igjen';
      document.getElementById('ln-progress-bar').style.width = '100%';
    }
    return;
  }

  const speed = parseInt(document.getElementById('speed-slider').value);
  const delay = lnSpeeds[speed - 1];

  lnTimer = setTimeout(() => {
    // Draw BATCH strikes per tick for higher speeds
    const batchSize = speed >= 4 ? 4 : speed >= 3 ? 2 : 1;
    for (let b = 0; b < batchSize && lnIndex < lightningData.length; b++) {
      drawStrike(lightningData[lnIndex]);
      lnIndex++;
    }

    // Update UI
    const strike = lightningData[Math.min(lnIndex, lightningData.length-1)];
    document.getElementById('ln-time').textContent =
      strike.ts.toLocaleString('no-NO',{
        day:'2-digit', month:'short',
        hour:'2-digit', minute:'2-digit'
      });
    document.getElementById('ln-progress-bar').style.width =
      (lnIndex / lightningData.length * 100).toFixed(1) + '%';

    scheduleNext();
  }, delay);
}

function drawStrike({ lat, lon, amp }) {
  const isCloud = amp >= 0;        // positive = cloud-to-cloud
  const absAmp  = Math.abs(amp);
  const radius  = Math.min(3 + absAmp * 0.12, 14);

  // Color: yellow/white for cloud-to-ground, cyan for cloud-to-cloud
  const color   = isCloud ? '#67e8f9' : '#fde047';
  const glow    = isCloud ? 'rgba(103,232,249,0.6)' : 'rgba(253,224,71,0.7)';

  const circle = L.circleMarker([lat,lon], {
    radius:      radius,
    fillColor:   color,
    fillOpacity: 0.9,
    color:       glow,
    weight:      3,
    className:   'ln-flash',
  });

  circle.addTo(lightningLayer);

  // Fade out and remove after animation
  setTimeout(() => {
    try { lightningLayer.removeLayer(circle); } catch(_){}
  }, 2200);
}

// ─────────────────────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────────────────────
init();
</script>
